name: Scrape KAWAII LAB Events

on:
  # 12時間ごとに自動実行（UTC基準。日本時間 09:00 / 21:00 ごろに実行される）
  schedule:
    - cron: "0 0,12 * * *"
  # GitHubの「Actions」タブから手動実行したい時のため
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: スクレイパーを実行
        run: npm run scrape

      - name: 変更があればコミット&プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: イベント情報を自動更新 [skip ci]"
            git push
          fi
